<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCast - 画面録画アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a26;
      --bg-hover: #222233;
      --accent: #ff4d6a;
      --accent-glow: rgba(255, 77, 106, 0.3);
      --accent-secondary: #7c5cff;
      --accent-secondary-glow: rgba(124, 92, 255, 0.3);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --border: #2a2a3a;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #ef4444;
      --radius: 12px;
      --radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(124,92,255,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(255,77,106,0.06) 0%, transparent 50%);
      z-index: 0; pointer-events: none;
    }
    .app { position: relative; z-index: 1; }

    /* Header */
    .header {
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.8);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    .nav-tabs { display: flex; gap: 4px; background: var(--bg-secondary); padding: 4px; border-radius: 10px; }
    .nav-tab {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }
    .nav-tab.active { background: var(--bg-card); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .nav-tab:hover:not(.active) { color: var(--text-primary); }

    .main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }

    /* Record View */
    .record-view { display: flex; flex-direction: column; align-items: center; gap: 32px; }
    .preview-container {
      position: relative; width: 100%; max-width: 900px; aspect-ratio: 16/9;
      background: var(--bg-secondary); border-radius: var(--radius-lg);
      overflow: hidden; border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .preview-container video, .preview-container .placeholder { width: 100%; height: 100%; object-fit: cover; }
    .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--text-muted); }
    .placeholder-icon { font-size: 64px; opacity: 0.3; }
    .placeholder-text { font-size: 16px; font-weight: 500; }

    .camera-bubble {
      position: absolute; bottom: 20px; left: 20px;
      width: 160px; height: 160px; border-radius: 50%;
      overflow: hidden; border: 3px solid var(--accent);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
      cursor: move; z-index: 10; transition: transform 0.2s ease;
    }
    .camera-bubble:hover { transform: scale(1.05); }
    .camera-bubble video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    .recording-indicator {
      position: absolute; top: 20px; left: 20px;
      display: none; align-items: center; gap: 8px;
      padding: 8px 16px; background: rgba(239,68,68,0.9);
      border-radius: 20px; font-size: 13px; font-weight: 600;
      backdrop-filter: blur(10px); z-index: 10;
    }
    .recording-indicator.active { display: flex; }
    .rec-dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .timer { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

    .controls { display: flex; align-items: center; gap: 16px; }
    .btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 28px; border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #ff2d50); color: white; box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); border-color: var(--text-muted); }
    .btn-stop { background: var(--danger); color: white; box-shadow: 0 4px 20px rgba(239,68,68,0.3); }
    .btn-pause { background: var(--warning); color: #000; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.15); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .btn-sm { padding: 8px 18px; font-size: 13px; }
    .btn-icon { font-size: 18px; }

    .settings-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .setting-card { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
    .setting-label { font-size: 13px; color: var(--text-secondary); }
    .toggle { position: relative; width: 44px; height: 24px; background: var(--bg-secondary); border-radius: 12px; cursor: pointer; transition: var(--transition); border: 1px solid var(--border); }
    .toggle.active { background: var(--accent); border-color: var(--accent); }
    .toggle::after { content:''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: var(--transition); }
    .toggle.active::after { left: 22px; }

    /* Library */
    .library-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .library-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .library-count { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .library-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .select-bar {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 20px; margin-bottom: 20px;
      background: var(--bg-card); border: 1px solid var(--accent);
      border-radius: var(--radius);
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
    .select-bar-count { font-size: 14px; font-weight: 600; color: var(--accent); }
    .select-bar-actions { display: flex; gap: 8px; margin-left: auto; }

    .recordings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    .recording-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: var(--transition); position: relative;
    }
    .recording-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .recording-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

    .card-checkbox {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      width: 24px; height: 24px;
      appearance: none; -webkit-appearance: none;
      background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px; cursor: pointer; transition: var(--transition);
      backdrop-filter: blur(8px);
    }
    .card-checkbox:checked {
      background: var(--accent); border-color: var(--accent);
    }
    .card-checkbox:checked::after {
      content: '✓'; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px; font-weight: 700;
      width: 100%; height: 100%;
    }
    .card-checkbox:hover { border-color: var(--accent); }

    .card-thumbnail { position: relative; aspect-ratio: 16/9; background: var(--bg-secondary); overflow: hidden; cursor: pointer; }
    .card-thumbnail video { width: 100%; height: 100%; object-fit: cover; }
    .card-duration {
      position: absolute; bottom: 8px; right: 8px;
      padding: 4px 10px; background: rgba(0,0,0,0.8);
      border-radius: 6px; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 500;
    }
    .card-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 56px; height: 56px;
      background: rgba(255,77,106,0.9); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; opacity: 0; transition: var(--transition);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .recording-card:hover .card-play { opacity: 1; }
    .card-info { padding: 16px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .card-title input {
      background: transparent; border: none; color: var(--text-primary);
      font-family: inherit; font-size: 15px; font-weight: 600;
      width: 100%; outline: none;
    }
    .card-title input:focus { border-bottom: 1px solid var(--accent); }
    .card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }

    .card-actions { display: flex; gap: 8px; padding: 0 16px 16px; flex-wrap: wrap; }
    .card-btn {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 12px; cursor: pointer; transition: var(--transition);
    }
    .card-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .card-btn.danger:hover { background: rgba(239,68,68,0.15); color: var(--danger); border-color: var(--danger); }
    .card-btn.share { border-color: var(--accent-secondary); color: var(--accent-secondary); }
    .card-btn.share:hover { background: rgba(124,92,255,0.15); }

    /* Share status */
    .share-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--success);
      margin-top: 6px;
    }
    .share-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-primary);
      padding: 4px 8px; border-radius: 4px;
      max-width: 200px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      cursor: pointer;
    }
    .share-url:hover { color: var(--text-primary); }

    /* Uploading indicator */
    .uploading-bar {
      height: 3px; background: var(--bg-secondary);
      border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .uploading-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      border-radius: 2px; transition: width 0.3s ease;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 40px; opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; max-width: 960px;
      background: var(--bg-card); border-radius: var(--radius-lg);
      overflow: hidden; border: 1px solid var(--border);
      transform: scale(0.95); transition: var(--transition);
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-video { width: 100%; aspect-ratio: 16/9; background: black; }
    .modal-video video { width: 100%; height: 100%; object-fit: contain; }
    .modal-controls { padding: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .modal-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: white; font-size: 20px; cursor: pointer;
      transition: var(--transition); z-index: 210;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }

    /* Share Config Modal */
    .config-modal {
      width: 100%; max-width: 560px;
      background: var(--bg-card); border-radius: var(--radius-lg);
      padding: 32px; border: 1px solid var(--border);
      transform: scale(0.95); transition: var(--transition);
    }
    .modal-overlay.active .config-modal { transform: scale(1); }
    .config-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .config-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .config-field { margin-bottom: 20px; }
    .config-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; }
    .config-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: var(--transition);
    }
    .config-input:focus { border-color: var(--accent-secondary); }
    .config-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }
    .config-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }

    /* Deploy Guide */
    .deploy-view { max-width: 800px; margin: 0 auto; }
    .deploy-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    .deploy-subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 40px; }
    .deploy-step {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px; margin-bottom: 20px;
      transition: var(--transition);
    }
    .deploy-step:hover { border-color: var(--accent-secondary); }
    .step-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .step-number {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent));
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
    }
    .step-title { font-size: 18px; font-weight: 600; }
    .step-content { color: var(--text-secondary); font-size: 14px; line-height: 1.8; padding-left: 52px; }
    .code-block {
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px; margin: 12px 0;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: var(--success); overflow-x: auto; position: relative;
    }
    .code-block .copy-btn {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 10px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-secondary); font-size: 11px;
      cursor: pointer; font-family: inherit;
    }
    .code-block .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 72px; margin-bottom: 20px; opacity: 0.3; }
    .empty-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .empty-text { color: var(--text-secondary); font-size: 14px; }

    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 28px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; font-weight: 500; z-index: 300;
      transition: var(--transition); box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .countdown-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 20;
    }
    .countdown-number { font-size: 120px; font-weight: 700; color: white; animation: countdownPulse 1s ease-in-out; }
    @keyframes countdownPulse { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.2);opacity:1} 100%{transform:scale(1);opacity:1} }

    /* Share viewer page */
    .viewer-page {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 80vh; gap: 24px;
    }
    .viewer-page video {
      max-width: 900px; width: 100%; border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .main { padding: 20px 16px; }
      .logo span { display: none; }
      .recordings-grid { grid-template-columns: 1fr; }
      .settings-row { flex-direction: column; align-items: center; }
      .camera-bubble { width: 100px; height: 100px; }
      .library-header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ============ IndexedDB ============
    const DB_NAME = 'ScreenCastDB';
    const DB_VERSION = 2;
    const STORE_NAME = 'recordings';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
      });
    }
    async function saveRecording(recording) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(recording);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function getAllRecordings() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function deleteRecording(id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function updateRecordingField(id, fields) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(id);
        req.onsuccess = () => {
          const rec = req.result;
          Object.assign(rec, fields);
          store.put(rec);
        };
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    // ============ Firebase ============
    let firebaseApp = null;
    let storage = null;

    function initFirebase(config) {
      try {
        if (firebaseApp) { /* already initialized */ return true; }
        firebaseApp = firebase.initializeApp(config);
        storage = firebase.storage();
        return true;
      } catch (e) {
        console.error('Firebase init error:', e);
        return false;
      }
    }

    function getFirebaseConfig() {
      try {
        const saved = localStorage.getItem('screencast_firebase_config');
        return saved ? JSON.parse(saved) : null;
      } catch { return null; }
    }

    function saveFirebaseConfig(config) {
      localStorage.setItem('screencast_firebase_config', JSON.stringify(config));
    }

    async function uploadToFirebase(blob, filename, onProgress) {
      if (!storage) throw new Error('Firebase not initialized');
      const ref = storage.ref().child(`recordings/${filename}`);
      const task = ref.put(blob);
      return new Promise((resolve, reject) => {
        task.on('state_changed',
          (snap) => { if (onProgress) onProgress(snap.bytesTransferred / snap.totalBytes); },
          reject,
          async () => {
            const url = await task.snapshot.ref.getDownloadURL();
            resolve(url);
          }
        );
      });
    }

    async function deleteFromFirebase(url) {
      if (!storage) return;
      try {
        const ref = storage.refFromURL(url);
        await ref.delete();
      } catch (e) { console.error('Firebase delete error:', e); }
    }

    // ============ Utility ============
    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }
    function formatDate(ts) {
      return new Date(ts).toLocaleDateString('ja-JP', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }
    function formatFileSize(bytes) {
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1)+' KB';
      return (bytes/(1024*1024)).toFixed(1)+' MB';
    }

    function Toast({ message, show }) {
      return <div className={`toast ${show ? 'show' : ''}`}>{message}</div>;
    }

    // ============ Check if shared viewer mode ============
    function getShareId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('view');
    }

    // ============ App ============
    function App() {
      const shareId = getShareId();
      if (shareId) return <SharedViewer url={decodeURIComponent(shareId)} />;
      return <MainApp />;
    }

    function SharedViewer({ url }) {
      return (
        <div className="app">
          <header className="header">
            <div className="logo">
              <div className="logo-icon">⏺</div>
              <span>ScreenCast</span>
            </div>
          </header>
          <main className="main">
            <div className="viewer-page">
              <video src={url} controls autoPlay style={{ maxWidth: 900, width: '100%', borderRadius: 20, border: '1px solid var(--border)' }} />
              <div style={{ display: 'flex', gap: 12 }}>
                <a href={url} download className="btn btn-secondary btn-sm" style={{ textDecoration: 'none' }}>💾 ダウンロード</a>
                <a href={window.location.origin} className="btn btn-primary btn-sm" style={{ textDecoration: 'none' }}>🎬 自分も録画する</a>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // ============ Main App ============
    function MainApp() {
      const [tab, setTab] = useState('record');
      const [recordings, setRecordings] = useState([]);
      const [isRecording, setIsRecording] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [elapsed, setElapsed] = useState(0);
      const [showCamera, setShowCamera] = useState(true);
      const [showCountdown, setShowCountdown] = useState(false);
      const [countdownNum, setCountdownNum] = useState(3);
      const [hasScreenStream, setHasScreenStream] = useState(false);
      const [playingRecording, setPlayingRecording] = useState(null);
      const [toastMsg, setToastMsg] = useState('');
      const [showToast, setShowToast] = useState(false);
      const [includeAudio, setIncludeAudio] = useState(true);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [showFirebaseConfig, setShowFirebaseConfig] = useState(false);
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [uploadingIds, setUploadingIds] = useState({});

      const screenVideoRef = useRef(null);
      const cameraVideoRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const screenStreamRef = useRef(null);
      const cameraStreamRef = useRef(null);
      const chunksRef = useRef([]);
      const timerRef = useRef(null);
      const startTimeRef = useRef(0);
      const pausedTimeRef = useRef(0);

      useEffect(() => {
        loadRecordings();
        const config = getFirebaseConfig();
        if (config) {
          const ok = initFirebase(config);
          setFirebaseReady(ok);
        }
      }, []);

      const loadRecordings = async () => {
        try {
          const recs = await getAllRecordings();
          setRecordings(recs.sort((a,b) => b.createdAt - a.createdAt));
        } catch(e) { console.error(e); }
      };

      const toast = (msg) => {
        setToastMsg(msg);
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3000);
      };

      // ---- Recording ----
      const startScreenCapture = async () => {
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor:'always' }, audio: includeAudio });
          screenStreamRef.current = stream;
          if (screenVideoRef.current) screenVideoRef.current.srcObject = stream;
          setHasScreenStream(true);
          stream.getVideoTracks()[0].onended = () => stopRecording();

          if (showCamera) {
            try {
              const camStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
              cameraStreamRef.current = camStream;
              if (cameraVideoRef.current) cameraVideoRef.current.srcObject = camStream;
            } catch(e) { console.log('Camera not available'); }
          }
          await runCountdown();
          beginRecording(stream);
        } catch(e) {
          console.error(e);
          toast('画面共有がキャンセルされました');
        }
      };

      const runCountdown = () => new Promise((resolve) => {
        setShowCountdown(true);
        let count = 3;
        setCountdownNum(count);
        const interval = setInterval(() => {
          count--;
          if (count === 0) { clearInterval(interval); setShowCountdown(false); resolve(); }
          else setCountdownNum(count);
        }, 1000);
      });

      const beginRecording = (stream) => {
        chunksRef.current = [];
        const combinedStream = new MediaStream([...stream.getTracks()]);
        const recorder = new MediaRecorder(combinedStream, {
          mimeType: MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm'
        });
        recorder.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
        recorder.onstop = async () => {
          const blob = new Blob(chunksRef.current, { type: 'video/webm' });
          await saveNewRecording(blob);
          cleanupStreams();
        };
        recorder.start(100);
        mediaRecorderRef.current = recorder;
        setIsRecording(true);
        setIsPaused(false);
        startTimeRef.current = Date.now();
        pausedTimeRef.current = 0;
        timerRef.current = setInterval(() => {
          setElapsed(Math.floor((Date.now() - startTimeRef.current - pausedTimeRef.current) / 1000));
        }, 200);
      };

      const pauseRecording = () => {
        if (mediaRecorderRef.current?.state === 'recording') {
          mediaRecorderRef.current.pause();
          setIsPaused(true);
          pausedTimeRef.current -= Date.now();
        }
      };
      const resumeRecording = () => {
        if (mediaRecorderRef.current?.state === 'paused') {
          mediaRecorderRef.current.resume();
          setIsPaused(false);
          pausedTimeRef.current += Date.now();
        }
      };
      const stopRecording = () => {
        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') mediaRecorderRef.current.stop();
        if (timerRef.current) clearInterval(timerRef.current);
        setIsRecording(false); setIsPaused(false); setElapsed(0); setHasScreenStream(false);
      };
      const cleanupStreams = () => {
        [screenStreamRef, cameraStreamRef].forEach(ref => {
          if (ref.current) { ref.current.getTracks().forEach(t => t.stop()); ref.current = null; }
        });
        if (screenVideoRef.current) screenVideoRef.current.srcObject = null;
        if (cameraVideoRef.current) cameraVideoRef.current.srcObject = null;
      };

      const saveNewRecording = async (blob) => {
        const id = 'rec_' + Date.now();
        const arrayBuffer = await blob.arrayBuffer();
        const recording = {
          id, title: `録画 ${new Date().toLocaleString('ja-JP')}`,
          blob: arrayBuffer, mimeType: 'video/webm',
          size: blob.size, duration: elapsed,
          createdAt: Date.now(), shareUrl: null
        };
        await saveRecording(recording);
        await loadRecordings();
        toast('✅ 録画を保存しました！');
        setTab('library');
      };

      // ---- Selection & Bulk Delete ----
      const toggleSelect = (id) => {
        setSelectedIds(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      };
      const selectAll = () => {
        if (selectedIds.size === recordings.length) setSelectedIds(new Set());
        else setSelectedIds(new Set(recordings.map(r => r.id)));
      };
      const bulkDelete = async () => {
        if (!confirm(`${selectedIds.size}件の録画を削除しますか？`)) return;
        for (const id of selectedIds) {
          const rec = recordings.find(r => r.id === id);
          if (rec?.shareUrl) await deleteFromFirebase(rec.shareUrl);
          await deleteRecording(id);
        }
        setSelectedIds(new Set());
        await loadRecordings();
        toast(`🗑️ ${selectedIds.size}件を削除しました`);
      };

      const handleDelete = async (id) => {
        if (!confirm('この録画を削除しますか？')) return;
        const rec = recordings.find(r => r.id === id);
        if (rec?.shareUrl) await deleteFromFirebase(rec.shareUrl);
        await deleteRecording(id);
        await loadRecordings();
        toast('録画を削除しました');
      };

      const handleDownload = (rec) => {
        const blob = new Blob([rec.blob], { type: rec.mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${rec.title}.webm`; a.click();
        URL.revokeObjectURL(url);
        toast('💾 ダウンロード開始');
      };

      // ---- Share (Firebase upload) ----
      const handleShare = async (rec) => {
        if (rec.shareUrl) {
          // Already shared, copy link
          const viewUrl = `${window.location.origin}${window.location.pathname}?view=${encodeURIComponent(rec.shareUrl)}`;
          await navigator.clipboard.writeText(viewUrl);
          toast('🔗 共有リンクをコピーしました！');
          return;
        }
        if (!firebaseReady) {
          setShowFirebaseConfig(true);
          toast('⚠️ Firebase設定が必要です');
          return;
        }
        try {
          setUploadingIds(prev => ({ ...prev, [rec.id]: 0 }));
          const blob = new Blob([rec.blob], { type: rec.mimeType });
          const filename = `${rec.id}_${Date.now()}.webm`;
          const url = await uploadToFirebase(blob, filename, (p) => {
            setUploadingIds(prev => ({ ...prev, [rec.id]: p }));
          });
          await updateRecordingField(rec.id, { shareUrl: url });
          await loadRecordings();
          setUploadingIds(prev => { const n = {...prev}; delete n[rec.id]; return n; });

          const viewUrl = `${window.location.origin}${window.location.pathname}?view=${encodeURIComponent(url)}`;
          await navigator.clipboard.writeText(viewUrl);
          toast('🔗 アップロード完了！共有リンクをコピーしました');
        } catch (e) {
          console.error(e);
          setUploadingIds(prev => { const n = {...prev}; delete n[rec.id]; return n; });
          toast('❌ アップロードに失敗しました');
        }
      };

      const handleTitleChange = async (id, newTitle) => {
        await updateRecordingField(id, { title: newTitle });
        await loadRecordings();
      };

      // ---- Firebase Config Save ----
      const handleSaveFirebaseConfig = (config) => {
        saveFirebaseConfig(config);
        const ok = initFirebase(config);
        setFirebaseReady(ok);
        setShowFirebaseConfig(false);
        if (ok) toast('✅ Firebase接続成功！');
        else toast('❌ Firebase接続に失敗しました');
      };

      return (
        <div className="app">
          <header className="header">
            <div className="logo">
              <div className="logo-icon">⏺</div>
              <span>ScreenCast</span>
            </div>
            <div className="nav-tabs">
              <button className={`nav-tab ${tab==='record'?'active':''}`} onClick={()=>setTab('record')}>🎬 録画</button>
              <button className={`nav-tab ${tab==='library'?'active':''}`} onClick={()=>setTab('library')}>📁 ライブラリ ({recordings.length})</button>
              <button className={`nav-tab ${tab==='deploy'?'active':''}`} onClick={()=>setTab('deploy')}>🚀 デプロイ</button>
            </div>
          </header>

          <main className="main">
            {tab === 'record' && (
              <div className="record-view">
                <div className="preview-container">
                  {hasScreenStream ? (
                    <video ref={screenVideoRef} autoPlay muted playsInline />
                  ) : (
                    <div className="placeholder">
                      <div className="placeholder-icon">🖥️</div>
                      <div className="placeholder-text">画面共有を開始してください</div>
                    </div>
                  )}
                  {showCamera && hasScreenStream && (
                    <div className="camera-bubble">
                      <video ref={cameraVideoRef} autoPlay muted playsInline />
                    </div>
                  )}
                  <div className={`recording-indicator ${isRecording && !isPaused ? 'active' : ''}`}>
                    <div className="rec-dot"></div>
                    <span>REC</span>
                    <span className="timer">{formatTime(elapsed)}</span>
                  </div>
                  {showCountdown && (
                    <div className="countdown-overlay">
                      <div className="countdown-number" key={countdownNum}>{countdownNum}</div>
                    </div>
                  )}
                </div>
                <div className="settings-row">
                  <div className="setting-card">
                    <span className="setting-label">📷 カメラ</span>
                    <div className={`toggle ${showCamera?'active':''}`} onClick={()=>setShowCamera(!showCamera)} />
                  </div>
                  <div className="setting-card">
                    <span className="setting-label">🔊 音声</span>
                    <div className={`toggle ${includeAudio?'active':''}`} onClick={()=>setIncludeAudio(!includeAudio)} />
                  </div>
                </div>
                <div className="controls">
                  {!isRecording ? (
                    <button className="btn btn-primary" onClick={startScreenCapture}>
                      <span className="btn-icon">⏺</span>録画を開始
                    </button>
                  ) : (
                    <>
                      {!isPaused ? (
                        <button className="btn btn-pause" onClick={pauseRecording}><span className="btn-icon">⏸</span>一時停止</button>
                      ) : (
                        <button className="btn btn-secondary" onClick={resumeRecording}><span className="btn-icon">▶</span>再開</button>
                      )}
                      <button className="btn btn-stop" onClick={stopRecording}><span className="btn-icon">⏹</span>停止して保存</button>
                    </>
                  )}
                </div>
              </div>
            )}

            {tab === 'library' && (
              <div className="library-view">
                <div className="library-header">
                  <div>
                    <div className="library-title">ライブラリ</div>
                    <div className="library-count">{recordings.length} 件の録画</div>
                  </div>
                  <div className="library-actions">
                    <button className="btn btn-secondary btn-sm" onClick={() => setShowFirebaseConfig(true)}>
                      {firebaseReady ? '🟢' : '⚪'} Firebase設定
                    </button>
                  </div>
                </div>

                {selectedIds.size > 0 && (
                  <div className="select-bar">
                    <input type="checkbox" checked={selectedIds.size === recordings.length} onChange={selectAll}
                      style={{ width: 18, height: 18, accentColor: 'var(--accent)', cursor: 'pointer' }} />
                    <span className="select-bar-count">{selectedIds.size}件を選択中</span>
                    <div className="select-bar-actions">
                      <button className="btn btn-danger btn-sm" onClick={bulkDelete}>🗑️ まとめて削除</button>
                      <button className="btn btn-secondary btn-sm" onClick={() => setSelectedIds(new Set())}>キャンセル</button>
                    </div>
                  </div>
                )}

                {recordings.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-icon">🎥</div>
                    <div className="empty-title">録画がありません</div>
                    <div className="empty-text">「録画」タブから画面録画を始めましょう</div>
                  </div>
                ) : (
                  <div className="recordings-grid">
                    {recordings.map(rec => (
                      <RecordingCard key={rec.id} rec={rec}
                        selected={selectedIds.has(rec.id)}
                        onToggleSelect={() => toggleSelect(rec.id)}
                        onPlay={() => setPlayingRecording(rec)}
                        onDownload={() => handleDownload(rec)}
                        onDelete={() => handleDelete(rec.id)}
                        onShare={() => handleShare(rec)}
                        onTitleChange={handleTitleChange}
                        uploadProgress={uploadingIds[rec.id]}
                        firebaseReady={firebaseReady}
                      />
                    ))}
                  </div>
                )}
              </div>
            )}

            {tab === 'deploy' && <DeployGuide />}
          </main>

          {playingRecording && <PlayerModal rec={playingRecording} onClose={() => setPlayingRecording(null)} />}
          {showFirebaseConfig && <FirebaseConfigModal onSave={handleSaveFirebaseConfig} onClose={() => setShowFirebaseConfig(false)} currentConfig={getFirebaseConfig()} />}
          <Toast message={toastMsg} show={showToast} />
        </div>
      );
    }

    // ============ Recording Card ============
    function RecordingCard({ rec, selected, onToggleSelect, onPlay, onDownload, onDelete, onShare, onTitleChange, uploadProgress, firebaseReady }) {
      const videoRef = useRef(null);
      const [title, setTitle] = useState(rec.title);

      useEffect(() => {
        if (videoRef.current) {
          const blob = new Blob([rec.blob], { type: rec.mimeType });
          videoRef.current.src = URL.createObjectURL(blob);
          videoRef.current.currentTime = 1;
        }
      }, [rec]);

      const handleBlur = () => { if (title !== rec.title) onTitleChange(rec.id, title); };
      const isUploading = uploadProgress !== undefined;

      const copyShareUrl = async () => {
        const viewUrl = `${window.location.origin}${window.location.pathname}?view=${encodeURIComponent(rec.shareUrl)}`;
        await navigator.clipboard.writeText(viewUrl);
      };

      return (
        <div className={`recording-card ${selected ? 'selected' : ''}`}>
          <input type="checkbox" className="card-checkbox" checked={selected} onChange={onToggleSelect} />
          <div className="card-thumbnail" onClick={onPlay}>
            <video ref={videoRef} muted preload="metadata" />
            <div className="card-duration">{formatTime(rec.duration)}</div>
            <div className="card-play">▶</div>
          </div>
          <div className="card-info">
            <div className="card-title">
              <input value={title} onChange={e => setTitle(e.target.value)} onBlur={handleBlur} onKeyDown={e => e.key==='Enter' && e.target.blur()} />
            </div>
            <div className="card-meta">
              <span>{formatDate(rec.createdAt)}</span>
              <span>{formatFileSize(rec.size)}</span>
            </div>
            {rec.shareUrl && (
              <div className="share-status">
                <span>🔗 共有中</span>
                <span className="share-url" onClick={copyShareUrl} title="クリックでコピー">
                  {rec.shareUrl.substring(0, 50)}...
                </span>
              </div>
            )}
            {isUploading && (
              <div className="uploading-bar">
                <div className="uploading-bar-fill" style={{ width: `${Math.round(uploadProgress * 100)}%` }} />
              </div>
            )}
          </div>
          <div className="card-actions">
            <button className={`card-btn share`} onClick={onShare} disabled={isUploading}>
              {isUploading ? `⏳ ${Math.round(uploadProgress*100)}%` : rec.shareUrl ? '🔗 リンクコピー' : '🔗 共有'}
            </button>
            <button className="card-btn" onClick={onDownload}>💾 DL</button>
            <button className="card-btn danger" onClick={onDelete}>🗑️</button>
          </div>
        </div>
      );
    }

    // ============ Player Modal ============
    function PlayerModal({ rec, onClose }) {
      const videoRef = useRef(null);
      useEffect(() => {
        if (videoRef.current) {
          const blob = new Blob([rec.blob], { type: rec.mimeType });
          videoRef.current.src = URL.createObjectURL(blob);
          videoRef.current.play();
        }
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [rec]);
      return (
        <div className="modal-overlay active" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <button className="modal-close" onClick={onClose}>✕</button>
          <div className="modal">
            <div className="modal-video"><video ref={videoRef} controls autoPlay /></div>
            <div className="modal-controls">
              <span style={{ fontWeight: 600 }}>{rec.title}</span>
              <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>
                {formatDate(rec.createdAt)} · {formatTime(rec.duration)} · {formatFileSize(rec.size)}
              </span>
            </div>
          </div>
        </div>
      );
    }

    // ============ Firebase Config Modal ============
    function FirebaseConfigModal({ onSave, onClose, currentConfig }) {
      const [apiKey, setApiKey] = useState(currentConfig?.apiKey || '');
      const [authDomain, setAuthDomain] = useState(currentConfig?.authDomain || '');
      const [projectId, setProjectId] = useState(currentConfig?.projectId || '');
      const [storageBucket, setStorageBucket] = useState(currentConfig?.storageBucket || '');
      const [appId, setAppId] = useState(currentConfig?.appId || '');

      const handleSave = () => {
        onSave({ apiKey, authDomain, projectId, storageBucket, appId });
      };

      return (
        <div className="modal-overlay active" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="config-modal">
            <div className="config-title">🔥 Firebase設定</div>
            <div className="config-subtitle">URL共有機能にはFirebase Storageが必要です。以下の手順で設定してください。</div>

            <div style={{ background: 'var(--bg-primary)', border: '1px solid var(--border)', borderRadius: 12, padding: 20, marginBottom: 24, fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.8 }}>
              <strong style={{ color: 'var(--text-primary)' }}>初回セットアップ手順：</strong><br/>
              1. <a href="https://console.firebase.google.com" target="_blank" style={{ color: 'var(--accent)' }}>Firebase Console</a> でプロジェクト作成<br/>
              2. 「Storage」→「始める」→ テストモードで開始<br/>
              3. 「プロジェクトの設定」→「全般」→ ウェブアプリを追加<br/>
              4. 表示される設定値を下にペースト
            </div>

            <div className="config-field">
              <label className="config-label">API Key</label>
              <input className="config-input" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AIzaSy..." />
            </div>
            <div className="config-field">
              <label className="config-label">Auth Domain</label>
              <input className="config-input" value={authDomain} onChange={e=>setAuthDomain(e.target.value)} placeholder="your-app.firebaseapp.com" />
            </div>
            <div className="config-field">
              <label className="config-label">Project ID</label>
              <input className="config-input" value={projectId} onChange={e=>setProjectId(e.target.value)} placeholder="your-project-id" />
            </div>
            <div className="config-field">
              <label className="config-label">Storage Bucket</label>
              <input className="config-input" value={storageBucket} onChange={e=>setStorageBucket(e.target.value)} placeholder="your-app.appspot.com" />
              <div className="config-hint">⚠️ 最も重要な項目です。正確に入力してください。</div>
            </div>
            <div className="config-field">
              <label className="config-label">App ID</label>
              <input className="config-input" value={appId} onChange={e=>setAppId(e.target.value)} placeholder="1:123456:web:abc123" />
            </div>

            <div className="config-actions">
              <button className="btn btn-secondary btn-sm" onClick={onClose}>キャンセル</button>
              <button className="btn btn-primary btn-sm" onClick={handleSave} disabled={!apiKey || !storageBucket}>保存して接続</button>
            </div>
          </div>
        </div>
      );
    }

    // ============ Deploy Guide ============
    function DeployGuide() {
      const copyCode = (text) => navigator.clipboard.writeText(text);
      const steps = [
        {
          title: 'Vercelアカウントを作成',
          content: <><p><a href="https://vercel.com" target="_blank" style={{color:'var(--accent)'}}>vercel.com</a> にアクセスし、GitHubアカウントでサインアップします。</p></>
        },
        {
          title: 'GitHubリポジトリを作成',
          content: <>
            <p><a href="https://github.com/new" target="_blank" style={{color:'var(--accent)'}}>github.com/new</a> でリポジトリを作成し、このindex.htmlをアップロードします。</p>
            <div className="code-block">
              <button className="copy-btn" onClick={()=>copyCode('git clone https://github.com/YOUR_USER/screencast-app.git\ncd screencast-app\ngit add index.html\ngit commit -m "Initial commit"\ngit push origin main')}>コピー</button>

        {

        },
        {
          title: 'Firebase Storageをセットアップ（URL共有用）',
          content: <>
            <p>録画をURL共有するには <a href="https://console.firebase.google.com" target="_blank" style={{color:'var(--accent)'}}>Firebase</a> が必要です。</p>
            <div className="code-block">
              1. Firebase Console → プロジェクト作成（無料）<br/>
              2. Storage → 始める → テストモードで開始<br/>
              3. プロジェクトの設定 → ウェブアプリを追加<br/>
              4. 表示された設定値をアプリの「Firebase設定」に入力
            </div>
            <p style={{marginTop: 8}}>⚠️ テストモードは30日間有効です。本番運用時はセキュリティルールを設定してください。</p>
            <div className="code-block">
              <button className="copy-btn" onClick={()=>copyCode('rules_version = \'2\';\nservice firebase.storage {\n  match /b/{bucket}/o {\n    match /recordings/{allPaths=**} {\n      allow read: if true;\n      allow write: if request.resource.size < 500 * 1024 * 1024;\n    }\n  }\n}')}>コピー</button>
              // Storage Rules（本番用推奨設定）<br/>
              rules_version = '2';<br/>
              service firebase.storage {'{'}<br/>
              &nbsp;&nbsp;match /b/{'{bucket}'}/o {'{'}<br/>
              &nbsp;&nbsp;&nbsp;&nbsp;match /recordings/{'{allPaths=**}'} {'{'}<br/>
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read: if true;<br/>
              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow write: if request.resource.size {'<'} 500 * 1024 * 1024;<br/>
              &nbsp;&nbsp;&nbsp;&nbsp;{'}'}<br/>
              &nbsp;&nbsp;{'}'}<br/>
              {'}'}
            </div>
          </>
        },
        {
          title: '代替: Netlify Drop（最速デプロイ）',
          content: <>
            <p><a href="https://app.netlify.com/drop" target="_blank" style={{color:'var(--accent)'}}>Netlify Drop</a> にindex.htmlをドラッグ&ドロップするだけ。GitHubアカウント不要です！</p>
          </>

      return (

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
